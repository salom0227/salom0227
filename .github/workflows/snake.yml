# ═══════════════════════════════════════════════════════════════
#  SHOXZOD QALANDAROV — GitHub Profile Auto-Update
#  Jobs: 🐍 snake  ·  📊 stats  ·  ✅ validate  ·  📋 report
#  Schedule: every 12h  +  push to main  +  manual
# ═══════════════════════════════════════════════════════════════

name: Profile README Auto-Update

on:
  schedule:
    - cron: "0 */12 * * *"
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  # ─────────────────────────────────────────────────────────────
  # 1 · CONTRIBUTION SNAKE
  # ─────────────────────────────────────────────────────────────
  snake:
    name: Generate Contribution Snake
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake (dark + light)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────
  # 2 · STATS REFRESH
  # ─────────────────────────────────────────────────────────────
  stats:
    name: Refresh GitHub Stats
    runs-on: ubuntu-latest
    needs: snake
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch stats via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: salom0227
        run: |
          python3 - <<'PYEOF'
          import urllib.request, json, os

          token = os.environ["GH_TOKEN"]
          user  = os.environ["USERNAME"]
          req   = urllib.request.Request(
              f"https://api.github.com/users/{user}",
              headers={
                  "Authorization": f"token {token}",
                  "Accept": "application/vnd.github+json"
              }
          )
          with urllib.request.urlopen(req) as r:
              data = json.loads(r.read())

          stats = {
              "public_repos": data.get("public_repos", 0),
              "followers":    data.get("followers",    0),
              "following":    data.get("following",    0),
              "updated_at":   data.get("updated_at",   ""),
          }
          with open("stats.json", "w") as f:
              json.dump(stats, f, indent=2)
          print(f"✅  repos={stats['public_repos']}  followers={stats['followers']}")
          PYEOF

      - name: Commit stats.json if changed
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add stats.json
          git diff --staged --quiet \
            || git commit -m "chore: auto-update stats.json [skip ci]"
          git push

  # ─────────────────────────────────────────────────────────────
  # 3 · VALIDATE
  # ─────────────────────────────────────────────────────────────
  validate:
    name: Validate Files
    runs-on: ubuntu-latest
    needs: stats
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check files exist
        run: |
          for f in README.md header.svg; do
            [ -f "$f" ] \
              && echo "✅  $f — $(wc -c < $f) bytes" \
              || { echo "❌  $f MISSING"; exit 1; }
          done

      - name: Validate header.svg XML
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          ET.parse('header.svg')
          print('✅  header.svg valid XML/SVG')
          "

  # ─────────────────────────────────────────────────────────────
  # 4 · SUMMARY REPORT
  # ─────────────────────────────────────────────────────────────
  report:
    name: Summary Report
    runs-on: ubuntu-latest
    needs: [ snake, stats, validate ]
    if: always()
    steps:
      - name: Write job summary
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Shoxzod Profile — Pipeline Summary

          | Job | Result |
          |-----|--------|
          | 🐍 Snake animation | ✅ pushed to `output` branch |
          | 📊 Stats refresh   | ✅ stats.json updated |
          | ✅ Validate        | ✅ README.md + header.svg OK |

          **Profile:** https://github.com/salom0227
          **Runs:** every 12 hours automatically
          EOF
