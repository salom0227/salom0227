# ============================================================
#  SHOXZOD QALANDAROV — GitHub Profile Auto-Update Pipeline
#  Runs: every 12 hours + on every push to main
# ============================================================

name: 🚀 Profile README Auto-Update

on:
  schedule:
    # Every 12 hours (UTC)
    - cron: "0 */12 * * *"
  push:
    branches:
      - main
  workflow_dispatch:   # Manual trigger button in GitHub UI

permissions:
  contents: write

jobs:

  # ──────────────────────────────────────────────
  # JOB 1: Generate Contribution Snake Animation
  # ──────────────────────────────────────────────
  snake-animation:
    name: 🐍 Generate Snake
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Snake (Dark + Light)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # JOB 2: Update GitHub Stats Cache
  # ──────────────────────────────────────────────
  update-stats:
    name: 📊 Refresh Stats
    runs-on: ubuntu-latest
    needs: snake-animation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests PyYAML

      - name: Fetch GitHub Stats & Write Badge Data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Salom0227
        run: |
          python3 - <<'EOF'
          import requests, json, os

          token   = os.environ["GITHUB_TOKEN"]
          user    = os.environ["USERNAME"]
          headers = {"Authorization": f"token {token}"}

          # Fetch user profile
          r = requests.get(f"https://api.github.com/users/{user}", headers=headers)
          data = r.json()

          stats = {
            "public_repos" : data.get("public_repos", 0),
            "followers"    : data.get("followers", 0),
            "following"    : data.get("following", 0),
            "updated_at"   : data.get("updated_at", ""),
          }

          with open("stats.json", "w") as f:
              json.dump(stats, f, indent=2)

          print(f"✅ Stats fetched: {stats}")
          EOF

      - name: Commit stats if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Actions Bot"
          git add stats.json || true
          git diff --staged --quiet || git commit -m "chore: 📊 auto-update stats [skip ci]"
          git push || true

  # ──────────────────────────────────────────────
  # JOB 3: Validate README Links (Health Check)
  # ──────────────────────────────────────────────
  validate-readme:
    name: 🔍 Validate README
    runs-on: ubuntu-latest
    needs: update-stats
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check README exists and not empty
        run: |
          if [ ! -f README.md ]; then
            echo "❌ README.md not found!"
            exit 1
          fi
          LINES=$(wc -l < README.md)
          echo "✅ README.md found — $LINES lines"

      - name: Validate badge URLs reachable
        run: |
          echo "🔗 Checking key badge services..."
          urls=(
            "https://komarev.com"
            "https://github-readme-stats.vercel.app"
            "https://readme-typing-svg.demolab.com"
            "https://capsule-render.vercel.app"
            "https://github-readme-activity-graph.vercel.app"
          )
          for url in "${urls[@]}"; do
            STATUS=$(curl -o /dev/null -s -w "%{http_code}" --max-time 10 "$url")
            echo "  [$STATUS] $url"
          done
          echo "✅ Badge check complete"

  # ──────────────────────────────────────────────
  # JOB 4: Auto-Deploy to GitHub Pages (optional)
  # ──────────────────────────────────────────────
  deploy-pages:
    name: 🌐 Deploy Profile Page
    runs-on: ubuntu-latest
    needs: validate-readme
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Convert README to HTML preview
        run: |
          npm install -g marked
          marked README.md > index.html
          echo "✅ HTML preview generated"

      - name: Summary report
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🐍 Snake animation | ✅ Generated |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Stats update    | ✅ Refreshed |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 README validate | ✅ Passed    |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 HTML preview    | ✅ Built     |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Profile:** https://github.com/Salom0227" >> $GITHUB_STEP_SUMMARY
