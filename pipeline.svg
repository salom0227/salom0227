<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }

      /* Node pulse animations */
      .node-dev   { animation: pulseC 2s ease-in-out infinite; }
      .node-git   { animation: pulseP 2s ease-in-out infinite 0.3s; }
      .node-act   { animation: pulseP 2s ease-in-out infinite 0.6s; }
      .node-jen   { animation: pulseR 2s ease-in-out infinite 0.5s; }
      .node-dock  { animation: pulseB 2s ease-in-out infinite 0.9s; }
      .node-k8s   { animation: pulseB 2s ease-in-out infinite 1.1s; }
      .node-ans   { animation: pulseO 2s ease-in-out infinite 1.3s; }
      .node-tf    { animation: pulseO 2s ease-in-out infinite 1.5s; }
      .node-mon   { animation: pulseG 2s ease-in-out infinite 1.7s; }

      @keyframes pulseC { 0%,100%{stroke:#00F7FF;filter:drop-shadow(0 0 4px #00F7FF)} 50%{stroke:#00bcd4;filter:drop-shadow(0 0 10px #00F7FF)} }
      @keyframes pulseP { 0%,100%{stroke:#bf5af2;filter:drop-shadow(0 0 4px #bf5af2)} 50%{stroke:#9333ea;filter:drop-shadow(0 0 10px #bf5af2)} }
      @keyframes pulseR { 0%,100%{stroke:#cc3333;filter:drop-shadow(0 0 4px #cc3333)} 50%{stroke:#ef4444;filter:drop-shadow(0 0 10px #cc3333)} }
      @keyframes pulseB { 0%,100%{stroke:#2496ed;filter:drop-shadow(0 0 4px #2496ed)} 50%{stroke:#38bdf8;filter:drop-shadow(0 0 10px #2496ed)} }
      @keyframes pulseO { 0%,100%{stroke:#f46800;filter:drop-shadow(0 0 4px #f46800)} 50%{stroke:#fb923c;filter:drop-shadow(0 0 10px #f46800)} }
      @keyframes pulseG { 0%,100%{stroke:#00ff88;filter:drop-shadow(0 0 4px #00ff88)} 50%{stroke:#34d399;filter:drop-shadow(0 0 10px #00ff88)} }

      /* Animated data packets */
      .pkt1 { animation: flow1 2.5s linear infinite; }
      .pkt2 { animation: flow2 2.5s linear infinite 0.5s; }
      .pkt3 { animation: flow3 2.5s linear infinite 0.8s; }
      .pkt4 { animation: flow4 2.5s linear infinite 1.2s; }
      .pkt5 { animation: flow5 2.5s linear infinite 1.5s; }
      .pkt6 { animation: flow6 2.5s linear infinite 1.0s; }
      .pkt7 { animation: flow7 2.5s linear infinite 1.8s; }
      .pkt8 { animation: flow8 2.5s linear infinite 0.3s; }

      /* DEV -> GITHUB */
      @keyframes flow1 {
        0%   { transform: translate(118px, 100px); opacity:1; }
        100% { transform: translate(198px, 100px); opacity:0; }
      }
      /* GITHUB -> ACTIONS */
      @keyframes flow2 {
        0%   { transform: translate(288px, 100px); opacity:1; }
        100% { transform: translate(360px, 55px); opacity:0; }
      }
      /* GITHUB -> JENKINS */
      @keyframes flow3 {
        0%   { transform: translate(288px, 100px); opacity:1; }
        100% { transform: translate(360px, 175px); opacity:0; }
      }
      /* ACTIONS -> DOCKER */
      @keyframes flow4 {
        0%   { transform: translate(460px, 55px); opacity:1; }
        100% { transform: translate(530px, 55px); opacity:0; }
      }
      /* JENKINS -> K8S */
      @keyframes flow5 {
        0%   { transform: translate(460px, 175px); opacity:1; }
        100% { transform: translate(530px, 175px); opacity:0; }
      }
      /* DOCKER -> ANSIBLE */
      @keyframes flow6 {
        0%   { transform: translate(625px, 55px); opacity:1; }
        100% { transform: translate(695px, 100px); opacity:0; }
      }
      /* K8S -> TERRAFORM */
      @keyframes flow7 {
        0%   { transform: translate(625px, 175px); opacity:1; }
        100% { transform: translate(695px, 140px); opacity:0; }
      }
      /* MONITOR blink */
      @keyframes flow8 {
        0%,100% { opacity:0.3; }
        50% { opacity:1; }
      }

      /* Edge dash animation */
      .edge { stroke-dasharray: 8 4; animation: dash 1.5s linear infinite; }
      @keyframes dash { to { stroke-dashoffset: -36; } }
    </style>

    <marker id="arr-c" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#00F7FF"/>
    </marker>
    <marker id="arr-p" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#bf5af2"/>
    </marker>
    <marker id="arr-b" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#2496ed"/>
    </marker>
    <marker id="arr-o" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#f46800"/>
    </marker>
    <marker id="arr-g" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#00ff88"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="12" fill="#050a0f" stroke="#00F7FF22" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#00F7FF" font-size="12" font-weight="700" letter-spacing="3">SHOXZOD'S DEVOPS PIPELINE</text>
  <line x1="40" y1="36" x2="760" y2="36" stroke="#00F7FF22" stroke-width="1"/>

  <!-- EDGES (drawn before nodes) -->
  <!-- DEV -> GITHUB -->
  <line class="edge" x1="118" y1="100" x2="198" y2="100" stroke="#00F7FF" stroke-width="1.5" marker-end="url(#arr-c)"/>
  <!-- GITHUB -> ACTIONS -->
  <line class="edge" x1="288" y1="90" x2="358" y2="58" stroke="#bf5af2" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <!-- GITHUB -> JENKINS -->
  <line class="edge" x1="288" y1="110" x2="358" y2="172" stroke="#cc3333" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#arr-p)"/>
  <!-- ACTIONS -> DOCKER -->
  <line class="edge" x1="458" y1="56" x2="528" y2="56" stroke="#2496ed" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <!-- JENKINS -> K8S -->
  <line class="edge" x1="458" y1="176" x2="528" y2="176" stroke="#2496ed" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <!-- DOCKER -> MONITOR -->
  <line class="edge" x1="624" y1="65" x2="694" y2="100" stroke="#f46800" stroke-width="1.5" marker-end="url(#arr-o)"/>
  <!-- K8S -> MONITOR -->
  <line class="edge" x1="624" y1="168" x2="694" y2="130" stroke="#f46800" stroke-width="1.5" marker-end="url(#arr-o)"/>

  <!-- Ansible/Terraform labels on edges -->
  <text x="572" y="46" fill="#f46800" font-size="9" text-anchor="middle">Ansible</text>
  <text x="572" y="196" fill="#7b42bc" font-size="9" text-anchor="middle">Terraform</text>

  <!-- DATA PACKET CIRCLES (animated) -->
  <circle class="pkt1" r="4" fill="#00F7FF"/>
  <circle class="pkt2" r="4" fill="#bf5af2"/>
  <circle class="pkt3" r="4" fill="#cc3333"/>
  <circle class="pkt4" r="4" fill="#2496ed"/>
  <circle class="pkt5" r="4" fill="#2496ed"/>
  <circle class="pkt6" r="4" fill="#f46800"/>
  <circle class="pkt7" r="4" fill="#7b42bc"/>
  <circle class="pkt8" r="5" fill="#00ff88"/>

  <!-- NODE: DEV -->
  <g class="node-dev">
    <rect x="28" y="78" width="90" height="44" rx="6" fill="#0d2137" stroke="#00F7FF" stroke-width="1.5"/>
    <text x="73" y="97" text-anchor="middle" fill="#00F7FF" font-size="10" font-weight="700">Dev</text>
    <text x="73" y="112" text-anchor="middle" fill="#00bcd4" font-size="8">Developer</text>
  </g>

  <!-- NODE: GITHUB -->
  <g class="node-git">
    <rect x="198" y="78" width="90" height="44" rx="6" fill="#1a0a2e" stroke="#bf5af2" stroke-width="1.5"/>
    <text x="243" y="97" text-anchor="middle" fill="#bf5af2" font-size="10" font-weight="700">GitHub</text>
    <text x="243" y="112" text-anchor="middle" fill="#9333ea" font-size="8">Repository</text>
  </g>

  <!-- NODE: GH ACTIONS -->
  <g class="node-act">
    <rect x="358" y="34" width="100" height="44" rx="6" fill="#1a0a2e" stroke="#bf5af2" stroke-width="1.5"/>
    <text x="408" y="53" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="700">GH Actions</text>
    <text x="408" y="68" text-anchor="middle" fill="#7c3aed" font-size="8">CI Pipeline</text>
  </g>

  <!-- NODE: JENKINS -->
  <g class="node-jen">
    <rect x="358" y="154" width="100" height="44" rx="6" fill="#1a0000" stroke="#cc3333" stroke-width="1.5"/>
    <text x="408" y="173" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="700">Jenkins</text>
    <text x="408" y="188" text-anchor="middle" fill="#cc3333" font-size="8">CD Pipeline</text>
  </g>

  <!-- NODE: DOCKER -->
  <g class="node-dock">
    <rect x="528" y="34" width="96" height="44" rx="6" fill="#0a1a2e" stroke="#2496ed" stroke-width="1.5"/>
    <text x="576" y="53" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">Docker</text>
    <text x="576" y="68" text-anchor="middle" fill="#2496ed" font-size="8">Containers</text>
  </g>

  <!-- NODE: K8S -->
  <g class="node-k8s">
    <rect x="528" y="154" width="96" height="44" rx="6" fill="#0a1a2e" stroke="#326ce5" stroke-width="1.5"/>
    <text x="576" y="173" text-anchor="middle" fill="#6ba3ff" font-size="10" font-weight="700">Kubernetes</text>
    <text x="576" y="188" text-anchor="middle" fill="#2496ed" font-size="8">Orchestration</text>
  </g>

  <!-- NODE: MONITOR -->
  <g class="node-mon">
    <rect x="694" y="78" width="88" height="64" rx="6" fill="#001a0a" stroke="#00ff88" stroke-width="1.5"/>
    <text x="738" y="99" text-anchor="middle" fill="#00ff88" font-size="10" font-weight="700">Monitor</text>
    <text x="738" y="113" text-anchor="middle" fill="#00cc70" font-size="8">Grafana</text>
    <text x="738" y="125" text-anchor="middle" fill="#00cc70" font-size="8">Prometheus</text>
    <text x="738" y="137" text-anchor="middle" fill="#00cc70" font-size="8">Zabbix</text>
  </g>

  <!-- BOTTOM LABEL -->
  <rect x="100" y="248" width="600" height="28" rx="6" fill="#0d1f2d" stroke="#00F7FF22"/>
  <text x="400" y="267" text-anchor="middle" fill="#00F7FF99" font-size="10" letter-spacing="2">Zero-Downtime  ·  Blue-Green  ·  Canary  ·  Rollback  ·  IaC</text>

  <!-- Live indicator -->
  <circle cx="755" cy="20" r="5" fill="#00ff88">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <text x="745" y="24" text-anchor="end" fill="#00ff88" font-size="9">LIVE</text>
</svg>
